# Reverse proxy for docker-compose.prod.yml (TLS typically terminated upstream).
# Mount as read-only: ./deploy/nginx-gonsgarage.conf:/etc/nginx/conf.d/default.conf:ro

server {
    listen 80;
    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger/ {
        proxy_pass http://api:8080/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://api:8080/health;
        proxy_set_header Host $host;
    }

    location = /ready {
        proxy_pass http://api:8080/ready;
        proxy_set_header Host $host;
    }

    location = /metrics {
        proxy_pass http://api:8080/metrics;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
