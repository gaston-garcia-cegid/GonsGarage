host: localhost:8080
info:
  contact: {}
  description: 'API de gestión de taller: autenticación JWT, coches, citas, reparaciones
    y empleados.'
  title: GonsGarage API
  version: 1.0.0
paths:
  /api/v1/appointments:
    get:
      parameters:
      - description: Filtro UUID cliente (staff)
        in: query
        name: customerId
        type: string
      - description: Filtro UUID coche
        in: query
        name: carId
        type: string
      - description: Estado (scheduled, confirmed, ...)
        in: query
        name: status
        type: string
      - description: Límite (default 10)
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: created_at o scheduled_at
        in: query
        name: sortBy
        type: string
      - description: ASC o DESC
        in: query
        name: sortOrder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_adapters_http_handlers.AppointmentResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Listar citas
      tags:
      - appointments
    post:
      consumes:
      - application/json
      parameters:
      - description: carID, scheduledAt (RFC3339), serviceType, etc.
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_adapters_http_handlers.CreateAppointmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.AppointmentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Crear cita
      tags:
      - appointments
  /api/v1/appointments/{id}:
    delete:
      parameters:
      - description: UUID de la cita
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Sin cuerpo
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Eliminar cita
      tags:
      - appointments
    get:
      parameters:
      - description: UUID de la cita
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.AppointmentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Obtener cita
      tags:
      - appointments
    put:
      consumes:
      - application/json
      parameters:
      - description: UUID de la cita
        in: path
        name: id
        required: true
        type: string
      - description: Campos a fusionar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_adapters_http_handlers.UpdateAppointmentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.AppointmentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Actualizar cita
      tags:
      - appointments
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Devuelve un JWT (campo token). El cliente debe llamar después a
        GET /auth/me para el perfil completo.
      parameters:
      - description: Credenciales
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_adapters_http_handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerLoginOK'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
      summary: Iniciar sesión
      tags:
      - auth
  /api/v1/auth/me:
    get:
      description: Requiere cabecera Authorization con esquema Bearer y el JWT.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMeOK'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Perfil actual
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Registro público. Email único; 409 si el usuario ya existe.
      parameters:
      - description: Datos de registro
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_gaston-garcia-cegid_gonsgarage_internal_core_ports.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerRegisterOK'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_adapters_http_handlers.SwaggerMessage'
      summary: Registro
      tags:
      - auth
  /api/v1/cars:
    get:
      parameters:
      - description: UUID del cliente dueño (solo staff)
        in: query
        name: ownerId
        type: string
      - description: Límite (staff sin ownerId; default 50)
