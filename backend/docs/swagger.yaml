host: localhost:8080
info:
  contact: {}
  description: 'API de gestión de taller: autenticación JWT, coches, citas, empleados,
    proveedores, facturas recibidas/emitidas y documentos de facturación.'
  title: GonsGarage API
  version: "1.0"
paths:
  /api/v1/admin/users:
    post:
      consumes:
      - application/json
      description: Cria utilizador com papel manager, employee ou client. Admin pode
        todos; manager não pode criar manager. Nunca cria admin por este fluxo.
      parameters:
      - description: Dados do novo utilizador
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_gaston-garcia-cegid_gonsgarage_internal_core_ports.ProvisionUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.SwaggerProvisionUserOK'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Aprovisionar utilizador (staff)
      tags:
      - admin
  /api/v1/appointments:
    get:
      parameters:
      - description: Filtro UUID cliente (staff)
        in: query
        name: customerId
        type: string
      - description: Filtro UUID coche
        in: query
        name: carId
        type: string
      - description: Estado (scheduled, confirmed, ...)
        in: query
        name: status
        type: string
      - description: Límite (default 10)
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: created_at o scheduled_at
        in: query
        name: sortBy
        type: string
      - description: ASC o DESC
        in: query
        name: sortOrder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler.AppointmentResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Listar citas
      tags:
      - appointments
    post:
      consumes:
      - application/json
      parameters:
      - description: carID, scheduledAt (RFC3339), serviceType, etc.
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateAppointmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.AppointmentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Crear cita
      tags:
      - appointments
  /api/v1/appointments/{id}:
    delete:
      parameters:
      - description: UUID de la cita
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Sin cuerpo
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Eliminar cita
      tags:
      - appointments
    get:
      parameters:
      - description: UUID de la cita
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.AppointmentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Obtener cita
      tags:
      - appointments
    put:
      consumes:
      - application/json
      parameters:
      - description: UUID de la cita
        in: path
        name: id
        required: true
        type: string
      - description: Campos a fusionar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.UpdateAppointmentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.AppointmentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Actualizar cita
      tags:
      - appointments
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Devuelve un JWT (campo token). El cliente debe llamar después a
        GET /auth/me para el perfil completo.
      parameters:
      - description: Credenciales
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.SwaggerLoginOK'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
      summary: Iniciar sesión
      tags:
      - auth
  /api/v1/auth/me:
    get:
      description: Requiere cabecera Authorization con esquema Bearer y el JWT.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMeOK'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
      security:
      - BearerAuth: []
      summary: Perfil actual
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Registro público. Email único; 409 si el usuario ya existe.
      parameters:
      - description: Datos de registro
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_gaston-garcia-cegid_gonsgarage_internal_core_ports.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.SwaggerRegisterOK'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.SwaggerMessage'
      summary: Registro
      tags:
      - auth
  /api/v1/billing-documents:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: '{items,total}'
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Listar documentos
      tags:
      - billing-documents
    post:
      consumes:
      - application/json
      parameters:
      - description: Datos
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateBillingDocumentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.BillingDocumentResponse'
      security:
      - BearerAuth: []
      summary: Crear documento de facturación emitido
      tags:
      - billing-documents
  /api/v1/billing-documents/{id}:
    delete:
      parameters:
      - description: UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Eliminar documento (baja lógica)
      tags:
      - billing-documents
    get:
      parameters:
      - description: UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.BillingDocumentResponse'
