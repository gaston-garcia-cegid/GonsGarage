# GonsGarage — política de despliegue: **solo manual** (2026-04-19).
#
# El camino soportado en repo es SSH al servidor + `docker compose` con `deploy/README.md`
# y `deploy.ps1` / `scripts/update-server-gonsgarage.sh`. No hay push automático a registry ni promote desde CI.
#
# Este workflow existe para dejar constancia en GitHub y para poder ampliarse (p. ej. `workflow_run`
# tras CI, build de imágenes, etc.) cuando haya destino fijo. Hoy solo imprime la política.

name: Deploy (manual — documentado)

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record manual deploy policy
        run: |
          echo "Deploy no está automatizado en Actions."
          echo "Ver deploy/README.md y README.md (sección despliegue / Swagger)."
          echo "Compose prod: docker-compose.prod.yml (+ override Arnela si aplica)."
