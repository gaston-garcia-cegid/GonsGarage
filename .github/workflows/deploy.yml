# Fase D: build de imagen API, smoke contra /health y opcional push a GHCR.
# Rollback: redeploy de la etiqueta/digest anterior de la imagen y, si aplica, restaurar backup de BD (docs/deployment-staging.md).

name: Deploy

on:
  workflow_dispatch:
    inputs:
      push_ghcr:
        description: "Push imagen API a ghcr.io (requiere permisos packages:write)"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Docker smoke (API + Postgres + Redis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Up (build)
        run: docker compose -f docker-compose.smoke.yml up -d --build

      - name: Wait for /health and /ready
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health && curl -sf http://localhost:8080/ready; then
              echo "health + ready OK"
              exit 0
            fi
            sleep 2
          done
          echo "::error::health/readiness timeout"
          docker compose -f docker-compose.smoke.yml logs
          exit 1

      - name: Down
        if: always()
        run: docker compose -f docker-compose.smoke.yml down -v

  push-api:
    name: Push API image to GHCR
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ inputs.push_ghcr == true }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR lowercase)
        id: meta
        run: echo "image=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.image }}/gonsgarage-api:${{ github.sha }}
            ghcr.io/${{ steps.meta.outputs.image }}/gonsgarage-api:latest
