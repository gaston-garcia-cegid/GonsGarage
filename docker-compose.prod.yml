# Stack staging / producción: Postgres 16, Redis 7, API Go, Next.js, worker async, Nginx edge (paridad Arnela).
#   docker compose --env-file .env -f docker-compose.prod.yml up -d --build
#
# El navegador suele apuntar a Nginx (HTTP_PUBLISH_PORT). Ajustar NEXT_PUBLIC_API_URL al mismo origen + /api/v1.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gonsgarage}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - gonsgarage_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - gonsgarage_redisdata_prod:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      GIN_MODE: release
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:-redis:6379}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      SERVER_PORT: "8080"
      MIGRATIONS_DIR: ${MIGRATIONS_DIR:-/app/db/migrations}
      ENABLE_SQL_MIGRATIONS: ${ENABLE_SQL_MIGRATIONS:-true}
      SKIP_GORM_AUTOMIGRATE: ${SKIP_GORM_AUTOMIGRATE:-false}
      AUTH_RATE_LIMIT_RPS: ${AUTH_RATE_LIMIT_RPS:-5}
      AUTH_RATE_LIMIT_BURST: ${AUTH_RATE_LIMIT_BURST:-10}
      AUTH_RATE_LIMIT_DISABLED: ${AUTH_RATE_LIMIT_DISABLED:-false}

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL in .env}
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "3000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_URL: ${REDIS_URL:-redis:6379}
      WORKER_QUEUE_KEY: ${WORKER_QUEUE_KEY:-gonsgarage:jobs}

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "${HTTP_PUBLISH_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx-gonsgarage.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  gonsgarage_pgdata_prod:
  gonsgarage_redisdata_prod:
