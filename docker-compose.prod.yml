# GonsGarage — producción / LAN (plantilla inspirada en Arnela).
# Postgres: ver deploy/README.md — si Arnela ya tiene `arnela-postgres` sin puerto en el host,
# añadí también `-f docker-compose.prod.arnela-network.yml` y `DATABASE_URL=@arnela-postgres:5432/...`.
# Si DATABASE_URL usa host arnela-postgres: compose DEBE incluir ese segundo -f (o COMPOSE_OVERRIDE en scripts/update-server-gonsgarage.sh).
# Uso: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Puerto público del stack: 8102 → nginx → front + /api/* al API.

services:
  redis:
    image: redis:7-alpine
    container_name: gonsgarage-redis
    restart: unless-stopped
    networks:
      - gonsgarage-network

  gonsgarage-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gonsgarage-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.prod}
      REDIS_URL: ${REDIS_URL:-redis:6379}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      GIN_MODE: ${GIN_MODE:-release}
      SERVER_PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env.prod}
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - gonsgarage-network

  gonsgarage-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env.prod}
    container_name: gonsgarage-frontend
    restart: unless-stopped
    depends_on:
      - gonsgarage-api
    networks:
      - gonsgarage-network

  gonsgarage-nginx:
    image: nginx:alpine
    container_name: gonsgarage-nginx
    restart: unless-stopped
    ports:
      - "8102:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gonsgarage-frontend
      - gonsgarage-api
    networks:
      - gonsgarage-network

networks:
  gonsgarage-network:
    driver: bridge
